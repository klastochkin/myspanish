<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Password — Spanish Study</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; } input:focus { outline: none; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔐</div>
      <h1 class="text-2xl font-extrabold text-slate-800">Choose Your Password</h1>
      <p class="text-slate-500 mt-1 text-sm">Welcome, <strong>{{ name }}</strong>! Set a password for your account.</p>
    </div>

    {% if error %}
    <div class="bg-rose-50 border border-rose-200 text-rose-600 text-sm rounded-xl px-4 py-3 mb-4">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/set-password"
          class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
      <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
      <input name="password" type="password" required autocomplete="new-password"
             class="w-full border border-slate-200 rounded-xl px-4 py-3 text-lg mb-4
                    focus:ring-2 focus:ring-violet-400 focus:border-violet-400 transition" />

      <label class="block text-sm font-semibold text-slate-700 mb-2">Confirm Password</label>
      <input name="confirm" type="password" required autocomplete="new-password"
             class="w-full border border-slate-200 rounded-xl px-4 py-3 text-lg mb-6
                    focus:ring-2 focus:ring-violet-400 focus:border-violet-400 transition" />

      <button type="submit"
              class="w-full bg-violet-600 hover:bg-violet-700 text-white font-semibold
                     py-3 rounded-xl transition">Set Password & Sign In</button>
    </form>

    <p class="text-center text-slate-400 text-xs mt-4">
      <a href="/login" class="hover:text-violet-600 transition">← Back to login</a>
    </p>
  </div>

</body>
</html>
