<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Spanish Study{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .shake { animation: shake 0.35s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-8px); }
      75%      { transform: translateX(8px); }
    }
    .pop { animation: pop 0.2s ease; }
    @keyframes pop {
      0%   { transform: scale(0.97); opacity: 0.6; }
      100% { transform: scale(1);    opacity: 1; }
    }
    .fade-up { animation: fadeUp 0.25s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    input:focus { outline: none; }
    .progress-bar { transition: width 0.4s ease; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

  <!-- Nav -->
  <nav class="bg-white border-b border-slate-100 px-6 py-3 flex items-center gap-3">
    <a href="/" class="text-slate-400 hover:text-violet-600 transition text-sm font-medium flex items-center gap-1">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l9-9 9 9M5 10v10h5v-6h4v6h5V10"/>
      </svg>
      Home
    </a>
    <span class="text-slate-200">|</span>
    <span class="text-slate-600 font-semibold text-sm">{% block nav_title %}Spanish Study{% endblock %}</span>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-10">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
